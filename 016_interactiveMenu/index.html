<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Menu with keyboard</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="wrapper">
      <h1>Interactive Menu</h1>

      <h2 class="heading">Keydown / Keyup</h2>

      <div class="instructions">
        <p>
          Press <kbd>M</kbd> or <kbd>ь</kbd>, for <strong>open</strong> the
          menu.
        </p>
        <p>
          Press <kbd>C</kbd> or <kbd>с</kbd>, for <strong>close</strong> the
          menu
        </p>
        <p>Use arrows <kbd>↑</kbd> and <kbd>↓</kbd> to navigate.</p>
      </div>

      <ul id="interactive-menu">
        <li>Профіль користувача</li>
        <li>Налаштування аккаунту</li>
        <li>Вийти з системи</li>
      </ul>
    </div>
  </body>
</html>
