<!DOCTYPE html>

  <title>Game rock scissors paper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main-content">
    <h1>Game rock scissors paper</h1>
    <ol class="task-list">
      <li>Створіть гру "Камінь, ножиці, папір".</li>
      <li>Гравець повинен обрати один з трьох варіантів: камінь, ножиці або папір.</li>
      <li>Компьютер випадковим чином обирає один з трьох варіантів.</li>
    </ol>
  </div>

  <script src="main.js"></script>
