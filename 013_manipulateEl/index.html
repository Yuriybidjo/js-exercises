<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Manipulate Elements</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="main-content">
      <!-- DOM manipulations -->
      <div class="box">
        <ul id="tree">
          <li>
            Елемент 1
            <ul>
              <li>Під-елемент 1.1</li>
              <li>
                Під-елемент 1.2
                <ul>
                  <li>Під-під-елемент 1.2.1</li>
                  <li>Під-під-елемент 1.2.2</li>
                </ul>
              </li>
              <li>Під-елемент 1.3</li>
            </ul>
          </li>
    
          <li>
            Елемент 2
            <ul>
              <li>Під-елемент 2.1</li>
              <li>Під-елемент 2.2</li>
            </ul>
          </li>
    
          <li>Елемент 3</li>
        </ul>
      </div>
      <!-- create a table with data -->
      <div class="box">
        <table id="books-table">
          <thead>
            <tr>
              <th>title</th>
              <th>year</th>
              <th>rating</th>
              <th>author</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
      <!-- example create elements into the box-->
      <div class="box" id="box"></div>
      <!-- prepend before / after -->
      <div class="box" id="box2" style="border-left: 10px solid"></div>

    </main>
  </body>
</html>
