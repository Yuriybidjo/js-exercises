<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event in JS</title>
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="wrapper">
      <!-- Color generate -->
      <p id="text" class="text">Color:</p>
      <button id="generate">Generate Color</button>
      <hr>
      <!-- Changing size -->
      <div class="change-size"></div>
      <hr>
      <!-- Counter -->
      <div class="counter">0</div>
      <div class="actions">
        <button class="button increase">Increase</button>
      </div>
      <hr>
      <!-- manipulations -->
      <div class="list-wrapper">
        <ul id="list-items" class="list-items">
          <li class="item">Item-1</li>
          <li class="item">Item-2</li>
          <li class="item">Item-3</li>
          <li class="item">Item-4</li>
          <li class="item">Item-5</li>
        </ul>
        <button class="button">Button</button>
      </div>
      <hr>
      <!-- block-container -->
       <div class="block-container">
        <button class="button first">1</button>
        <button class="button second">2</button>
        <button class="button third">3</button>
       </div>
    </div>
  </body>
</html>
